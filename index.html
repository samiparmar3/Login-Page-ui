<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(rgb(13, 13, 13), rgb(191, 37, 191), rgb(22, 22, 239));

        }

        .card {
            display: flex;
            text-align: center;
            padding: 50px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            flex-direction: column;
            align-items: center;
            border-radius: 10px;
            transition: 0.3s ease;
            line-height: 2;

        }

        .card:hover {
            transform: scale(1.03);
        }

        h1 {
            text-shadow: 2px 3px 5px rgba(0, 0, 0, 0.8);

        }

        #btn {
            margin-top: 10px;
            padding: 12px;
            border-radius: 8px;
            background: linear-gradient(#35c26b, #49e2f3, #dcd155);
            cursor: pointer;
            width: 100px;
            border: none;
            font-weight: bold;
        }

        #btn:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        .input-box{
            position: relative;
            width: 100%;
            margin: 10px;
            /* padding: 12px 14px; */
            
        }

        .input-box input{
            width: 90%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;  
            outline: none;  
        }

        .input-box label{
            position: absolute;
            left: 12px;
            top: 12px;
            color: gray;
            transition: 0.3s;
            background:transparent ;
            pointer-events: none;
        }

        .input-box input:focus ~ label,
        .input-box input:valid ~ label{

            top: -8px;
            left: 10px;
            font-size: 12px;
            color: #6c63ff;
            background: rgba(255,255,255,0.2);
            padding: 0 5px;
            border-radius: 10px;
        }
        /* input { */
            /* width: 90%; */
            /* padding: /10px; */
            /* border-radius: 8px; */
            /* border: 1px solid #ccc; */
            /* outline: none; */
        /* } */

        /* .input { */
            /* margin-bottom: 15px; */
        /* } */

        /* input:focus { */
            /* border-color: #6c63ff; */
            /* box-shadow: 0 0 5px rgba(108, 99, 255, 0.5); */

        /* } */

        a {
            text-decoration: none;
            color: #6c63ff;
            font-weight: 500;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="card">

            <form action="#">

                <h1>Login Page</h1>

                <div class="input-box">
                    <input type="email" required >
                    <label>Email</label>
                </div>

                <div class="input-box">

                    <input type="password" required>
                    <label>password</label>

                </div>

                <button id="btn">Submit</button>

                <p>Forgot Password? </p>
                <a href="#" target="_blank">Create account</a>

        </div>
        </form>
    </div>
</body>

</html>
